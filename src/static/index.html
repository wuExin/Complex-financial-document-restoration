<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AFAC 数据集浏览器</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
  <header id="tabs-bar">
    <nav id="tabs"></nav>
    <div id="search-box">
      <input id="search-input" type="search" placeholder="按 UUID 搜索（当前标签内）" disabled>
    </div>
  </header>
  <main>
    <aside id="sidebar">
      <div id="sidebar-header"></div>
      <div id="thumbs"></div>
    </aside>
    <section id="viewer">
      <div id="toolbar">
        <span id="filename" class="mono">未选择</span>
        <span id="file-meta" class="meta"></span>
        <div class="spacer"></div>
        <span id="position-info" class="mono">—</span>
      </div>
      <div id="canvas">
        <button id="prev" class="nav-arrow" title="上一张">‹</button>
        <div id="status-panel">
          <img id="preview-thumb" alt="" hidden>
          <div id="status-text">点击左侧缩略图用系统查看器打开</div>
        </div>
        <button id="next" class="nav-arrow" title="下一张">›</button>
      </div>
      <div id="statusbar">
        <span id="hint">← → 翻页</span>
      </div>
    </section>
  </main>
</div>
<script src="/static/app.js"></script>
</body>
</html>
